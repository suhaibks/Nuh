<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuh</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0b0b0b;
    color: #eaeaea;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}

/* GRAIN */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.04;
    pointer-events: none;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('images/IMG-20250726-WA0007.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
}

.hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
    letter-spacing: 3px;
    opacity: 0;
    transform: translateY(40px);
    transition: 1.5s ease;
}

.hero h1.show {
    opacity: 1;
    transform: translateY(0);
}

/* TEXT BLOCK */
.text-block {
    height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 20px;
}

.text-block p {
    max-width: 600px;
    font-size: 1.3rem;
    line-height: 1.8;
    color: #cfcfcf;
    opacity: 0;
    transform: translateY(40px);
    transition: 1s ease;
}

.text-block.show p {
    opacity: 1;
    transform: translateY(0);
}

/* FULL IMAGE */
.full {
    height: 90vh;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* GALLERY */
.gallery {
    padding: 80px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 18px;
}

.gallery img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 14px;
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    transition: 0.8s ease;
}

.gallery img.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

.gallery img:hover {
    transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
}

/* FOOTER */
.footer {
    height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    color: #888;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <h1 id="heroText">Nuh</h1>
</section>

<!-- TEXT -->
<section class="text-block">
    <p>
        A life unfolding, one quiet moment at a time.
    </p>
</section>

<!-- IMAGE -->
<div class="full" style="background-image:url('images/IMG-20250813-WA0013.jpg')"></div>

<!-- TEXT -->
<section class="text-block">
    <p>
        Not every moment needs words.
    </p>
</section>

<!-- GALLERY -->
<div class="gallery"></div>

<!-- FOOTER -->
<div class="footer">
    A story still being written.
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <img id="lightbox-img">
</div>

<script>
// HERO
window.onload = () => {
    document.getElementById('heroText').classList.add('show');
};

// SCROLL REVEAL
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add('show');
        }
    });
}, { threshold: 0.2 });

document.querySelectorAll('.text-block').forEach(el => observer.observe(el));

// IMAGES
const images = [
  "IMG-20250726-WA0007.jpg",
  "IMG-20250813-WA0013.jpg",
  "IMG-20251023-WA0015.jpg",
  "IMG-20251102-WA0016.jpg",
  "IMG-20251102-WA0020.jpg",
  "IMG-20260308-WA0055.jpg",
  "IMG-20260309-WA0021.jpg",
  "IMG_20250911_215155.jpg",
  "IMG_20260208_191304.jpg",
  "IMG_9737.jpeg",
  "IMG_9738.jpeg",
  "IMG_9739.jpeg",
  "IMG_9740.jpeg",
  "IMG_9743.jpeg",
  "IMG_9745.jpeg",
  "IMG_9747.jpeg",
  "IMG_9754.jpeg",
  "IMG_9758.jpeg",
  "IMG_9759.jpeg",
  "IMG_9760.jpeg",
  "IMG_9761.jpeg",
  "IMG_9762.jpeg",
  "IMG_9764.jpeg",
  "IMG_9765.jpeg",
  "IMG_9766.jpeg",
  "IMG_9767.jpeg",
  "IMG_9768.jpeg",
  "IMG_9769.jpeg",
  "IMG_9770.jpeg",
  "IMG_9843.jpeg"
];

const gallery = document.querySelector('.gallery');

images.forEach((file, i) => {
    const img = document.createElement('img');
    img.src = `images/${file}`;

    img.onload = () => {
        setTimeout(() => img.classList.add('show'), i * 80);
    };

    img.onclick = () => {
        document.getElementById('lightbox').style.display = 'flex';
        document.getElementById('lightbox-img').src = img.src;
    };

    gallery.appendChild(img);
});

// LIGHTBOX CLOSE
document.getElementById('lightbox').onclick = () => {
    document.getElementById('lightbox').style.display = 'none';
};
</script>

</body>
</html>
