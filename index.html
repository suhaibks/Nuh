<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuh Turns One</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #faf7f2;
    color: #2d2d2d;
}

/* HERO */
.hero {
    height: 90vh;
    background: url('images/img1.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
}

/* SECTION */
.section {
    padding: 60px 20px;
    text-align: center;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Nuh Turns One</h1>
</div>

<!-- TEXT -->
<div class="section">
    <p>A year full of love, laughter, and beautiful memories.</p>
</div>

<!-- GALLERY -->
<div class="gallery"></div>

<script>
// Auto load images (change number based on your images)
const gallery = document.querySelector('.gallery');

for (let i = 1; i <= 20; i++) {
    const img = document.createElement('img');
    img.src = `images/img${i}.jpg`;
    img.onerror = () => img.remove(); // removes if image doesn't exist
    gallery.appendChild(img);
}
</script>

</body>
</html>
