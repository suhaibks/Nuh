<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuh Photo Memories</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f5f0;
      --text: #2d2d2d;
      --card: #ffffff;
      --accent: #d99873;
      --muted: #6c6c6c;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: radial-gradient(circle at top right, #fff8ef 0%, var(--bg) 40%);
      color: var(--text);
      line-height: 1.5;
    }

    .hero {
      min-height: 58vh;
      padding: 2rem 1rem;
      background: linear-gradient(rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.45)),
        url("images/IMG_20260208_191304.jpg") center/cover no-repeat;
      display: grid;
      place-items: center;
      text-align: center;
      color: #fff;
    }

    .hero h1 {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(2.1rem, 5vw, 3.8rem);
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 0.8rem 0 0;
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      opacity: 0.95;
    }

    .section {
      max-width: 1150px;
      margin: 0 auto;
      padding: 2.7rem 1rem 1.6rem;
      text-align: center;
    }

    .section h2 {
      margin: 0 0 0.5rem;
      font-family: "Playfair Display", serif;
      font-size: clamp(1.8rem, 3vw, 2.3rem);
    }

    .section p {
      margin: 0 auto;
      max-width: 760px;
      color: var(--muted);
    }

    .gallery {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      grid-auto-rows: 12px;
      gap: 14px;
    }

    .photo {
      margin: 0;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      grid-row: span 22;
      position: relative;
    }

    .photo.tall {
      grid-row: span 30;
    }

    .photo.wide {
      grid-row: span 18;
    }

    .photo:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.14);
    }

    .photo img {
      width: 100%;
      height: calc(100% - 52px);
      object-fit: cover;
      display: block;
    }

    .photo figcaption {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.4rem 0.75rem;
      font-size: 0.9rem;
      color: var(--muted);
      background: linear-gradient(180deg, #fff, #fff8f1);
      border-top: 1px solid #f0e7df;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: var(--muted);
      font-size: 0.88rem;
    }
  </style>
</head>
<body>
  <header class="hero">
    <div>
      <h1>Nuh's Memory Gallery</h1>
      <p>A collection of happy moments, love, and everyday magic.</p>
    </div>
  </header>

  <main>
    <section class="section" aria-label="About">
      <h2>Beautiful Moments Together</h2>
      <p>
        Every photo has its own title, and the gallery now uses a stylish mixed-size grid so all images do not look exactly the same.
      </p>
    </section>

    <section class="gallery" id="gallery" aria-label="Photo gallery"></section>
  </main>

  <footer>Made with love 💛</footer>

  <script>
    const images = [
      { file: "IMG-20251102-WA0016.jpg", title: "Warm Family Smile", style: "tall" },
      { file: "IMG-20251102-WA0020.jpg", title: "Golden Hour Joy", style: "wide" },
      { file: "IMG_20250911_215155.jpg", title: "Little Explorer", style: "" },
      { file: "IMG-20250813-WA0013.jpg", title: "Playful Afternoon", style: "tall" },
      { file: "IMG_20260208_191304.jpg", title: "Bright Eyes", style: "" },
      { file: "IMG-20260309-WA0021.jpg", title: "Happy Together", style: "wide" },
      { file: "IMG-20260308-WA0055.jpg", title: "Sweet Candid", style: "" },
      { file: "IMG-20251023-WA0015.jpg", title: "Cozy Day Out", style: "tall" },
      { file: "Screenshot_2025-09-04-21-41-27-584_com.whatsapp.png", title: "Special Chat Memory", style: "wide" },
      { file: "IMG-20250726-WA0007.jpg", title: "Tiny Steps", style: "" }
    ];

    const gallery = document.getElementById("gallery");

    images.forEach(({ file, title, style }, index) => {
      const figure = document.createElement("figure");
      figure.className = `photo ${style}`.trim();

      const img = document.createElement("img");
      img.src = `images/${file}`;
      img.alt = `${title} - photo ${index + 1}`;
      img.loading = "lazy";

      const caption = document.createElement("figcaption");
      caption.textContent = title;

      figure.appendChild(img);
      figure.appendChild(caption);
      gallery.appendChild(figure);
    });
  </script>
</body>
</html>
