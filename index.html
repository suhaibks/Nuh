<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuh</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0a0a;
    color: #eaeaea;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}

/* GRAIN */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.04;
    pointer-events: none;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('images/IMG-20250726-WA0007.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
}

.hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
    letter-spacing: 3px;
}

/* SCROLL TEXT */
.text {
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}

.text p {
    font-size: 1.4rem;
    max-width: 600px;
    color: #cfcfcf;
    opacity: 0;
}

/* IMAGE SECTION */
.image-section {
    height: 100vh;
    overflow: hidden;
}

.image-section img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.2);
}

/* GALLERY */
.gallery {
    padding: 100px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
}

.gallery img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 14px;
    opacity: 0;
    transform: translateY(50px);
}

/* FOOTER */
.footer {
    height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    color: #888;
}
</style>
</head>

<body>

<section class="hero">
    <h1>Nuh</h1>
</section>

<section class="text">
    <p>A life unfolding, one quiet moment at a time.</p>
</section>

<div class="gallery"></div>

<div class="footer">
    A story still being written.
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

// TEXT FADE IN
gsap.utils.toArray(".text p").forEach(el => {
    gsap.to(el, {
        opacity: 1,
        y: -20,
        duration: 1.2,
        scrollTrigger: {
            trigger: el,
            start: "top 80%",
        }
    });
});

// IMAGE ZOOM EFFECT
gsap.utils.toArray(".image-section img").forEach(img => {
    gsap.to(img, {
        scale: 1,
        scrollTrigger: {
            trigger: img,
            start: "top bottom",
            end: "bottom top",
            scrub: true
        }
    });
});

// GALLERY IMAGES
const images = [
  "IMG-20250726-WA0007.jpg",
  "IMG-20250813-WA0013.jpg",
  "IMG-20251023-WA0015.jpg",
  "IMG-20251102-WA0016.jpg",
  "IMG-20251102-WA0020.jpg",
  "IMG-20260308-WA0055.jpg",
  "IMG-20260309-WA0021.jpg",
  "IMG_20250911_215155.jpg",
  "IMG_20260208_191304.jpg",
  "IMG_9737.jpeg",
  "IMG_9738.jpeg",
  "IMG_9739.jpeg",
  "IMG_9740.jpeg",
  "IMG_9743.jpeg",
  "IMG_9745.jpeg",
  "IMG_9747.jpeg",
  "IMG_9754.jpeg",
  "IMG_9758.jpeg",
  "IMG_9759.jpeg",
  "IMG_9760.jpeg",
  "IMG_9761.jpeg",
  "IMG_9762.jpeg",
  "IMG_9764.jpeg",
  "IMG_9765.jpeg",
  "IMG_9766.jpeg",
  "IMG_9767.jpeg",
  "IMG_9768.jpeg",
  "IMG_9769.jpeg",
  "IMG_9770.jpeg",
  "IMG_9843.jpeg"
];

const gallery = document.querySelector('.gallery');

images.forEach((file, i) => {
    const img = document.createElement('img');
    img.src = `images/${file}`;

    gallery.appendChild(img);

    gsap.to(img, {
        opacity: 1,
        y: 0,
        delay: i * 0.05,
        scrollTrigger: {
            trigger: img,
            start: "top 90%",
        }
    });
});
</script>

</body>
</html>
