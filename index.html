<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuh</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}

/* FILM GRAIN */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.05;
    pointer-events: none;
    z-index: 999;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('images/IMG-20250726-WA0007.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
}

.hero-content {
    position: relative;
    text-align: center;
    z-index: 2;
    opacity: 0;
    transform: translateY(40px);
    transition: 1.5s ease;
}

.hero-content.show {
    opacity: 1;
    transform: translateY(0);
}

.hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
    letter-spacing: 3px;
}

/* TEXT SECTION */
.section {
    padding: 120px 20px;
    max-width: 700px;
    margin: auto;
    text-align: center;
    opacity: 0;
    transform: translateY(60px);
    transition: 1.2s ease;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

.section p {
    font-size: 1.2rem;
    line-height: 1.8;
    color: #bdbdbd;
}

/* PARALLAX */
.full-image {
    height: 80vh;
    background: url('images/IMG-20250813-WA0013.jpg') center/cover fixed no-repeat;
}

/* GALLERY */
.gallery {
    padding: 80px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
}

.gallery img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    border-radius: 14px;
    opacity: 0;
    transform: scale(0.92);
    transition: 0.8s ease;
    cursor: pointer;
}

.gallery img.show {
    opacity: 1;
    transform: scale(1);
}

.gallery img:hover {
    transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 80px 20px;
    font-size: 0.85rem;
    color: #777;
    letter-spacing: 1px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-content" id="heroText">
        <h1>Nuh</h1>
    </div>
</section>

<!-- TEXT -->
<section class="section">
    <p>
        A collection of moments, quietly captured —
        fragments of time that tell a story without words.
    </p>
</section>

<!-- PARALLAX -->
<div class="full-image"></div>

<!-- GALLERY -->
<div class="gallery"></div>

<!-- FOOTER -->
<div class="footer">
    A life, in moments.
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <img id="lightbox-img">
</div>

<script>
// HERO ANIMATION
window.onload = () => {
    document.getElementById('heroText').classList.add('show');
};

// SCROLL REVEAL
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add('show');
        }
    });
}, { threshold: 0.2 });

document.querySelectorAll('.section').forEach(el => observer.observe(el));

// IMAGE LIST (YOUR FILES)
const images = [
  "IMG-20250726-WA0007.jpg",
  "IMG-20250813-WA0013.jpg",
  "IMG-20251023-WA0015.jpg",
  "IMG-20251102-WA0016.jpg",
  "IMG-20251102-WA0020.jpg",
  "IMG-20260308-WA0055.jpg",
  "IMG-20260309-WA0021.jpg",
  "IMG_20250911_215155.jpg",
  "IMG_20260208_191304.jpg",
  "IMG_9737.jpeg",
  "IMG_9738.jpeg",
  "IMG_9739.jpeg",
  "IMG_9740.jpeg",
  "IMG_9743.jpeg",
  "IMG_9745.jpeg",
  "IMG_9747.jpeg",
  "IMG_9754.jpeg",
  "IMG_9758.jpeg",
  "IMG_9759.jpeg",
  "IMG_9760.jpeg",
  "IMG_9761.jpeg",
  "IMG_9762.jpeg",
  "IMG_9764.jpeg",
  "IMG_9765.jpeg",
  "IMG_9766.jpeg",
  "IMG_9767.jpeg",
  "IMG_9768.jpeg",
  "IMG_9769.jpeg",
  "IMG_9770.jpeg",
  "IMG_9843.jpeg"
];

const gallery = document.querySelector('.gallery');

images.forEach(file => {
  const img = document.createElement('img');
  img.src = `images/${file}`;

  img.onload = () => {
    setTimeout(() => img.classList.add('show'), 100);
  };

  img.onclick = () => {
    document.getElementById('lightbox').style.display = 'flex';
    document.getElementById('lightbox-img').src = img.src;
  };

  gallery.appendChild(img);
});

// CLOSE LIGHTBOX
document.getElementById('lightbox').onclick = () => {
  document.getElementById('lightbox').style.display = 'none';
};
</script>

</body>
</html>
